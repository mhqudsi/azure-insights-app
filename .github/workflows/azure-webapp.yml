name: Build and Deploy Angular SSR to Azure Web App

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: azureinsightsmonitoring-ui
  NODE_VERSION: 22

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # STEP 1: Checkout source
      - name: Checkout Code
        uses: actions/checkout@v4

      # STEP 2: Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # STEP 3: Clean previous build
      - name: Clean Old Build
        run: rm -rf dist

      # STEP 4: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # STEP 5: Build Angular SSR
      # Requires package.json build script for SSR (usually "build": "ng build")
      # If using Angular Universal, this should generate browser + server folders
      - name: Build Angular SSR App
        run: npm run build

      # STEP 6: Verify output
      - name: Verify Dist Structure
        run: ls -R dist

      # STEP 7: Prepare deployment package
      # Azure needs package root containing server.js + browser folder
      - name: Prepare SSR Package
        run: |
          mkdir deploy
          cp package.json deploy/
          cp package-lock.json deploy/
          cp -R dist/azure-insights-app/browser deploy/browser
          cp -R dist/azure-insights-app/server deploy/server

      # STEP 8: Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # STEP 9: Deploy SSR package
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: dist/azure-insights-app/browser
