name: Build and Deploy Angular Container to Azure Web App

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: azureinsightsmonitoring-ui02
  IMAGE_NAME: azure-insights-ui

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR login server
        id: acr
        shell: bash
        run: |
          if [ -n "angularregistry786" ]; then
            REGISTRY_NAME="angularregistry786"
          elif [ -n "angularregistry786" ]; then
            REGISTRY_NAME="angularregistry786"
          else
            echo "::error::Set repository variable or secret AZURE_CONTAINER_REGISTRY_NAME (ACR name only, e.g. myregistry)."
            exit 1
          fi
          LOGIN_SERVER=$(az acr show --name "$REGISTRY_NAME" --query loginServer -o tsv)
          echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "registry_name=$REGISTRY_NAME" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ steps.acr.outputs.registry_name }}

      - name: Build and push container image
        env:
          LOGIN_SERVER: ${{ steps.acr.outputs.login_server }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${LOGIN_SERVER}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          docker build -t "$IMAGE" -t "${LOGIN_SERVER}/${{ env.IMAGE_NAME }}:latest" .
          docker push "$IMAGE"
          docker push "${LOGIN_SERVER}/${{ env.IMAGE_NAME }}:latest"
          echo "DEPLOY_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Resolve resource group
        id: rg
        shell: bash
        run: |
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          if [ -z "$RG" ]; then
            RG="${{ secrets.AZURE_RESOURCE_GROUP }}"
          fi
          if [ -z "$RG" ]; then
            RG=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup | [0]" -o tsv)
          fi
          if [ -z "$RG" ] || [ "$RG" = "null" ]; then
            echo "::error::Could not resolve resource group. Set AZURE_RESOURCE_GROUP variable or secret."
            exit 1
          fi
          echo "name=$RG" >> "$GITHUB_OUTPUT"
          echo "AZURE_RESOURCE_GROUP=$RG" >> "$GITHUB_ENV"

      - name: Configure Web App container settings
        run: |
          az webapp config appsettings set \
            --resource-group "${{ steps.rg.outputs.name }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --settings WEBSITES_PORT=8080 WEBSITES_ENABLE_APP_SERVICE_STORAGE=false

      - name: Grant Web App managed identity pull access to ACR
        continue-on-error: true
        run: |
          az webapp identity assign \
            --resource-group "${{ steps.rg.outputs.name }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --output none
          PRINCIPAL_ID=$(az webapp identity show \
            --resource-group "${{ steps.rg.outputs.name }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --query principalId -o tsv)
          ACR_ID=$(az acr show --name "${{ steps.acr.outputs.registry_name }}" --query id -o tsv)
          az role assignment create \
            --assignee-object-id "$PRINCIPAL_ID" \
            --assignee-principal-type ServicePrincipal \
            --role AcrPull \
            --scope "$ACR_ID" \
            2>/dev/null || true

      - name: Deploy container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ steps.rg.outputs.name }}
          images: ${{ env.DEPLOY_IMAGE }}
