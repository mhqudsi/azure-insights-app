# Build and deploy the Angular SSR app to Azure App Service (Linux, Node 20).
# Setup: Azure Portal → Web App → Deployment Center → Download publish profile,
# then add it as GitHub secret AZURE_WEBAPP_PUBLISH_PROFILE.

name: Deploy to Azure Web App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  # Must match your App Service name (https://<name>.azurewebsites.net)
  AZURE_WEBAPP_NAME: azureinsightsmonitoringui
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
